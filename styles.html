<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>傣族织锦纹样拼图游戏 | 纹样灵韵</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui, 'Segoe UI', 'Microsoft YaHei', 'Noto Sans', sans-serif;
        user-select: none; /* 避免拖拽时选中文字，提升手感 */
    }

    body {
        background: #f5efe7;
        padding: 20px 16px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* 返回首页按钮 */
    .back-home {
        display: inline-block;
        width: fit-content;
        margin-bottom: 24px;
        padding: 8px 28px;
        background: #553c2b;
        color: #fef2e0;
        font-size: 0.95rem;
        text-decoration: none;
        border-radius: 40px;
        transition: all 0.2s ease;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        border: none;
        cursor: pointer;
    }
    .back-home:hover {
        background: #7a4d34;
        transform: translateY(-1px);
    }

    /* 主布局 */
    .main-wrap {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 32px;
        flex-wrap: wrap;
        max-width: 1250px;
        margin: 0 auto;
    }

    /* 左右控制面板 */
    .ctrl-side {
        background: #fffef7;
        padding: 24px 20px;
        border-radius: 32px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        width: 220px;
        transition: all 0.2s;
        border: 1px solid #f0e2d4;
    }

    .ctrl-side h4 {
        color: #553c2b;
        font-weight: 600;
        font-size: 1.2rem;
        margin-bottom: 16px;
        text-align: center;
        letter-spacing: 1px;
        border-left: 4px solid #b85c33;
        padding-left: 12px;
        margin-left: 8px;
    }

    .pattern-select, .diff-select {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 28px;
    }

    .pattern-btn, .diff-btn {
        background: #f4e6dc;
        border: none;
        padding: 10px 12px;
        border-radius: 60px;
        font-size: 0.9rem;
        font-weight: 500;
        color: #553c2b;
        cursor: pointer;
        transition: 0.2s;
        text-align: center;
        letter-spacing: 1px;
    }

    .pattern-btn.active, .diff-btn.active {
        background: #b85c33;
        color: white;
        box-shadow: 0 4px 8px rgba(184, 92, 51, 0.3);
    }

    .pattern-btn:hover, .diff-btn:hover {
        background: #d47c51;
        color: white;
        transform: scale(0.98);
    }

    .status-info {
        text-align: center;
        background: #faf3ea;
        border-radius: 28px;
        padding: 14px 10px;
        margin-top: 8px;
    }
    .status-info div {
        font-size: 1.1rem;
        font-weight: 500;
        color: #4b2e1f;
        margin: 8px 0;
    }
    .status-info span {
        background: white;
        padding: 4px 12px;
        border-radius: 40px;
        font-family: monospace;
        font-weight: bold;
        color: #b85c33;
        margin-left: 6px;
    }

    /* 拼图核心正方形容器 + 特效封装 */
    .puzzle-center {
        background: #fff9f2;
        padding: 18px;
        border-radius: 40px;
        box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
        transition: box-shadow 0.2s;
    }

    #puzzle-container {
        display: grid;
        gap: 0;
        margin: 0 auto;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
        transition: box-shadow 0.3s, border-color 0.2s;
    }

    /* 胜利时外发光+边框绿色闪烁特效 */
    .win-glow-effect {
        animation: greenPulse 0.6s ease-in-out 3, borderGlow 0.4s ease;
        box-shadow: 0 0 0 4px #2e7d32, 0 0 0 8px rgba(46,125,50,0.3);
        border-radius: 24px;
    }

    @keyframes greenPulse {
        0% { box-shadow: 0 0 0 0 #2e7d32, 0 0 0 4px rgba(46,125,50,0.5); }
        70% { box-shadow: 0 0 0 12px #2e7d32, 0 0 0 18px rgba(46,125,50,0.2); }
        100% { box-shadow: 0 0 0 4px #2e7d32, 0 0 0 8px rgba(46,125,50,0.4); }
    }

    @keyframes borderGlow {
        0% { border-color: #b85c33; }
        50% { border-color: #6fbf4c; }
        100% { border-color: #2e7d32; }
    }

    .puzzle-piece {
        background-repeat: no-repeat;
        cursor: grab;
        transition: filter 0.1s, transform 0.05s linear;
        will-change: background-position;
    }
    .puzzle-piece:active {
        cursor: grabbing;
    }
    .puzzle-piece.correct {
        border: 2px solid #b85c33;
        filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
    }

    /* 模态窗 ———— 高级纹样弹窗 */
    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(30, 20, 15, 0.65);
        backdrop-filter: blur(4px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        animation: fadeIn 0.2s;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .modal-content {
        background: #fffef9;
        width: 90%;
        max-width: 380px;
        border-radius: 48px;
        padding: 28px 22px 32px;
        text-align: center;
        box-shadow: 0 30px 40px rgba(0, 0, 0, 0.3);
        border: 1px solid #ffe2cc;
        transition: transform 0.2s;
        animation: modalPop 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes modalPop {
        from { transform: scale(0.92); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    /* 纹样缩略图 (低饱和度+柔光) */
    .pattern-preview {
        width: 110px;
        height: 110px;
        margin: 0 auto 18px;
        border-radius: 32px;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        filter: saturate(0.6) brightness(1.02);
        box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        border: 2px solid #f0cfb5;
    }

    .modal-content h3 {
        font-size: 1.9rem;
        color: #4b2e1f;
        margin-bottom: 12px;
        font-weight: 700;
        letter-spacing: 1px;
    }

    .meaning-text {
        background: #f9efE6;
        padding: 12px 16px;
        border-radius: 50px;
        color: #8b5a3c;
        font-size: 1rem;
        margin: 18px 0 12px;
        font-weight: 500;
        line-height: 1.4;
    }

    .close-modal {
        background: #b85c33;
        border: none;
        color: white;
        padding: 12px 28px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 80px;
        margin-top: 12px;
        cursor: pointer;
        transition: 0.2s;
        letter-spacing: 1px;
    }
    .close-modal:hover {
        background: #9b4a2a;
        transform: scale(0.96);
    }

    @media (max-width: 780px) {
        .ctrl-side {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .pattern-select, .diff-select {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
        }
        .ctrl-side h4 {
            width: 100%;
            text-align: center;
        }
        .main-wrap {
            gap: 20px;
        }
        .puzzle-center {
            padding: 12px;
        }
    }
</style>
</head>
<body>

<a href="index.html" class="back-home">← 返回首页</a>

<div class="main-wrap">
    <!-- 左侧控制区 -->
    <div class="ctrl-side">
        <h4>🎨 傣韵纹样</h4>
        <div class="pattern-select">
            <button class="pattern-btn" data-id="1">🪷 八角纳福</button>
            <button class="pattern-btn" data-id="2">🐘 吉象呈瑞</button>
            <button class="pattern-btn" data-id="3">🏞️ 锦寺荷居</button>
            <button class="pattern-btn" data-id="4">🦚 雀羽呈祥</button>
        </div>

        <h4>⚙️ 难度调节</h4>
        <div class="diff-select">
            <button class="diff-btn" data-level="3">3 × 3 轻松</button>
            <button class="diff-btn" data-level="4">4 × 4 雅趣</button>
            <button class="diff-btn" data-level="5">5 × 5 匠造</button>
        </div>

        <div class="status-info">
            <div>⏱️ 用时 <span id="time">00:00</span></div>
            <div>🚶 步数 <span id="step">0</span></div>
        </div>
    </div>

    <!-- 中间拼图区 (正方形核心) -->
    <div class="puzzle-center" id="puzzleCenterWrap">
        <div id="puzzle-container"></div>
    </div>
</div>

<!-- 定制化纹样完成弹窗（含低饱和度图+寓意） -->
<div class="modal" id="winModal">
    <div class="modal-content">
        <div id="patternPreviewImg" class="pattern-preview"></div>
        <h3 id="patternNameTitle">八角纳福</h3>
        <div class="meaning-text" id="meaningText">八方来财，纳福迎祥</div>
        <button class="close-modal">✨ 继续织锦 ✨</button>
    </div>
</div>

<script>
    (function(){
        // ---------- 纹样配置（包含图片地址，寓意，以及名称）--------
        // 请确保 pattern1.jpg ~ pattern4.jpg 与网页同目录，或更换为有效路径
        // 为了更好的兼容，此处我用本地文件名，也可以替换为在线占位图。
        // 若图片不存在，浏览器会显示破碎，您可替换成实际的图案url。但为了效果，demo确保演示逻辑。
        const patterns = {
            1: { 
                img: 'pattern1.jpg', 
                meaning: '八角纳福：寓意八方来财，纳福迎祥，象征团圆美满。',
                shortName: '八角纳福',
                lowSatPreviewBg: 'pattern1.jpg'  // 实际展示低饱和度通过css filter: saturate(0.6)
            },
            2: { 
                img: 'pattern2.jpg', 
                meaning: '吉象呈瑞：寓意万象更新，吉祥如意，庇佑平安顺遂。',
                shortName: '吉象呈瑞',
                lowSatPreviewBg: 'pattern2.jpg'
            },
            3: { 
                img: 'pattern3.jpg', 
                meaning: '锦寺荷居：寓意平安顺遂，清雅高洁，心归宁静。',
                shortName: '锦寺荷居',
                lowSatPreviewBg: 'pattern3.jpg'
            },
            4: { 
                img: 'pattern4.jpg', 
                meaning: '雀羽呈祥：寓意前程似锦，吉祥安康，展翅高飞。',
                shortName: '雀羽呈祥',
                lowSatPreviewBg: 'pattern4.jpg'
            }
        };

        // DOM 元素
        const puzzleContainer = document.getElementById('puzzle-container');
        const timeText = document.getElementById('time');
        const stepText = document.getElementById('step');
        const winModal = document.getElementById('winModal');
        const meaningTextEl = document.getElementById('meaningText');
        const patternNameTitle = document.getElementById('patternNameTitle');
        const patternPreviewImg = document.getElementById('patternPreviewImg');
        const closeModalBtn = document.querySelector('.close-modal');
        const puzzleCenterWrap = document.getElementById('puzzleCenterWrap'); // 用于特效外框

        let curPatternId = 1;          // 当前纹样id
        let gridNum = 3;               // 当前难度 3/4/5
        let squareTotalSize = 450;     // 正方形总边长(px)
        let steps = 0;
        let timer = null;
        let startTime = 0;
        let dragTarget = null;
        let isGameCompleted = false;    // 防止重复触发特效/弹窗

        // 辅助函数：停止计时器
        function stopTimer() {
            if(timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        // 重置计时与步数
        function resetStats() {
            steps = 0;
            stepText.innerText = steps;
            if(timer) clearInterval(timer);
            startTime = Date.now();
            timer = setInterval(countTime, 1000);
            isGameCompleted = false;   // 新游戏重置胜利标记
            // 移除拼图容器的胜利特效边框
            if(puzzleCenterWrap) puzzleCenterWrap.classList.remove('win-glow-effect');
        }

        // 计时更新
        function countTime() {
            if(isGameCompleted) return; // 如果已经胜利不再更新时间显示，避免微微变动，但是胜利后已clear，不过安全起见
            let elapsed = Math.floor((Date.now() - startTime) / 1000);
            let m = Math.floor(elapsed / 60);
            let s = elapsed % 60;
            timeText.innerText = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
        }

        // 核心：初始化/重置拼图（打乱、重新生成网格）
        function initPuzzle() {
            // 清除胜利模态框残留显示
            winModal.style.display = 'none';
            // 移除特效
            if(puzzleCenterWrap) puzzleCenterWrap.classList.remove('win-glow-effect');
            // 重置胜利标记
            isGameCompleted = false;
            // 重置计时和步数
            stopTimer();
            resetStats();  // 内部重新启动计时器

            // 获取当前图片URL
            let imgUrl = patterns[curPatternId].img;

            // 动态计算每个格子实际宽高 (基于grid 均分)
            let itemSize = squareTotalSize / gridNum;
            // 设置容器grid样式
            puzzleContainer.style.width = squareTotalSize + "px";
            puzzleContainer.style.height = squareTotalSize + "px";
            puzzleContainer.style.gridTemplateColumns = `repeat(${gridNum}, 1fr)`;
            puzzleContainer.style.gridTemplateRows = `repeat(${gridNum}, 1fr)`;

            // 存储每个格子应有的正确背景位置 (rightX, rightY)
            let correctPositions = [];
            let pieceElements = [];

            // 生成所有拼图块（未打乱）
            for(let row = 0; row < gridNum; row++) {
                for(let col = 0; col < gridNum; col++) {
                    const piece = document.createElement('div');
                    piece.className = 'puzzle-piece';
                    // 计算背景偏移量：左偏移 -col*itemSize, 上偏移 -row*itemSize
                    const bgX = -col * itemSize;
                    const bgY = -row * itemSize;
                    piece.style.backgroundImage = `url(${imgUrl})`;
                    piece.style.backgroundSize = `${squareTotalSize}px ${squareTotalSize}px`;
                    piece.style.backgroundPosition = `${bgX}px ${bgY}px`;
                    piece.style.backgroundRepeat = 'no-repeat';
                    
                    // 记录原始正确坐标字符串
                    piece.dataset.rightX = bgX;
                    piece.dataset.rightY = bgY;
                    const correctPos = `${bgX}px ${bgY}px`;
                    correctPositions.push(correctPos);
                    
                    // 拖拽设置
                    piece.draggable = true;
                    piece.addEventListener('dragstart', handleDragStart);
                    piece.addEventListener('dragover', (e) => e.preventDefault());
                    piece.addEventListener('drop', handleDrop);
                    
                    pieceElements.push(piece);
                }
            }

            // Fisher-Yates 随机打乱拼图顺序
            for(let i = pieceElements.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieceElements[i], pieceElements[j]] = [pieceElements[j], pieceElements[i]];
            }

            // 清空容器并追加打乱的拼图块
            puzzleContainer.innerHTML = '';
            pieceElements.forEach(piece => puzzleContainer.appendChild(piece));
            
            // 保存正确顺序数组到容器，用于校验
            puzzleContainer.correctPosArray = correctPositions;
            
            // 给所有块添加正确/不正确样式初始检测
            checkAllCorrect(false);  // 只刷新样式，不触发胜利弹窗（因为刚开始未完成）
        }

        // 拖拽开始
        function handleDragStart(e) {
            if(isGameCompleted) {
                e.preventDefault();
                return false;
            }
            dragTarget = this;
            e.dataTransfer.effectAllowed = 'move';
        }

        // 拖拽交换
        function handleDrop(e) {
            e.preventDefault();
            if(isGameCompleted) return;
            if(!dragTarget || dragTarget === this) return;
            
            // 交换两个拼图块的 backgroundPosition
            const tempBg = dragTarget.style.backgroundPosition;
            dragTarget.style.backgroundPosition = this.style.backgroundPosition;
            this.style.backgroundPosition = tempBg;
            
            // 增加步数
            steps++;
            stepText.innerText = steps;
            
            // 每次交换后检查是否完成
            checkAllCorrect(true);
        }

        // 检查拼图是否全部归位，根据correctPosArray对比每个块的backgroundPosition
        // showWin: 如果完成就触发胜利特效与弹窗
        function checkAllCorrect(triggerWin = true) {
            const pieces = puzzleContainer.querySelectorAll('.puzzle-piece');
            const correctArray = puzzleContainer.correctPosArray;
            if(!correctArray || pieces.length !== correctArray.length) return false;
            
            let allMatched = true;
            pieces.forEach((piece, idx) => {
                let currentPos = piece.style.backgroundPosition;
                // 不同浏览器可能返回带px或者空格，统一标准化比较: 去除空格并trim对比
                let normalizedCurrent = currentPos.trim().replace(/\s+/g, ' ');
                let normalizedRight = correctArray[idx].trim().replace(/\s+/g, ' ');
                if(normalizedCurrent === normalizedRight) {
                    piece.classList.add('correct');
                } else {
                    piece.classList.remove('correct');
                    allMatched = false;
                }
            });
            
            // 已完成且需要触发胜利事件 && 防止重复触发
            if(allMatched && triggerWin && !isGameCompleted) {
                isGameCompleted = true;
                // 停止计时
                stopTimer();
                // 1. 给拼图外框增加绿色流光特效（最外部边框区域）
                if(puzzleCenterWrap) {
                    puzzleCenterWrap.classList.add('win-glow-effect');
                    // 额外保险：3秒后移除特效动画保持但会保留最终阴影不过不影响下一次游戏
                    setTimeout(() => {
                        if(puzzleCenterWrap && !isGameCompleted === false) {
                            // 如果不重新开始游戏，特效可以保留但下次初始化会移除，无碍
                        }
                    }, 1000);
                }
                // 2. 显示富文本弹窗：低饱和度纹样预览图+对应寓意
                showPatternWinModal();
            }
            return allMatched;
        }
        
        // 显示带纹样低饱和度图片及寓意的弹窗
        function showPatternWinModal() {
            const patternData = patterns[curPatternId];
            if(!patternData) return;
            
            // 设置弹窗文本内容
            patternNameTitle.innerText = patternData.shortName;
            meaningTextEl.innerText = patternData.meaning;
            
            // 设置预览图片背景（低饱和度通过css滤镜实现）
            const previewUrl = patternData.lowSatPreviewBg || patternData.img;
            // 样式上我们已经给 pattern-preview 设置了 filter: saturate(0.6) ，实现低饱和度效果
            patternPreviewImg.style.backgroundImage = `url(${previewUrl})`;
            patternPreviewImg.style.backgroundSize = 'cover';
            patternPreviewImg.style.backgroundPosition = 'center';
            
            // 显示模态框
            winModal.style.display = 'flex';
        }
        
        // 关闭弹窗，无额外动作，但保留拼图完成状态，用户可继续点击新游戏
        function closeModalHandler() {
            winModal.style.display = 'none';
            // 注意：关闭弹窗后，游戏停留在胜利界面（拼图不可交换？为了体验，胜利后不再允许拖动）
            // 但用户如果切换纹样或者难度会自动重置，因此无需额外限制。
        }
        
        // 切换纹样
        function changePattern(patternId) {
            if(isGameCompleted) {
                // 如果当前已经胜利，切换纹样会重新开始，清除标记
            }
            curPatternId = patternId;
            // 重置所有状态并初始化拼图
            initPuzzle();
        }
        
        // 切换难度
        function changeDifficulty(level) {
            gridNum = level;
            // 根据网格数微调整大小 保证视觉舒适: 3x3用450px; 4x4用500px; 5x5用500px
            if(gridNum === 3) squareTotalSize = 450;
            else if(gridNum === 4) squareTotalSize = 500;
            else if(gridNum === 5) squareTotalSize = 520;
            else squareTotalSize = 450;
            initPuzzle();
        }
        
        // 绑定UI事件：纹样按钮
        document.querySelectorAll('.pattern-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                if(isNaN(id)) return;
                // 更新active样式
                document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                changePattern(id);
            });
        });
        
        // 难度按钮事件
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const level = parseInt(btn.dataset.level);
                if(isNaN(level)) return;
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                changeDifficulty(level);
            });
        });
        
        // 关闭弹窗
        if(closeModalBtn) {
            closeModalBtn.addEventListener('click', closeModalHandler);
        }
        // 点击模态背景关闭（可选优雅）
        winModal.addEventListener('click', (e) => {
            if(e.target === winModal) closeModalHandler();
        });
        
        // 为防止默认图片加载失败时影响体验，预先在控制台提醒，但不影响游戏机制
        // 页面启动默认激活第一个纹样按钮和第一个难度
        window.onload = () => {
            // 默认激活样式
            const defaultPattern = document.querySelector('.pattern-btn[data-id="1"]');
            if(defaultPattern) defaultPattern.classList.add('active');
            const defaultDiff = document.querySelector('.diff-btn[data-level="3"]');
            if(defaultDiff) defaultDiff.classList.add('active');
            curPatternId = 1;
            gridNum = 3;
            squareTotalSize = 450;
            initPuzzle();
        };
        
        // 暴露额外清除避免内存问题
    })();
</script>
</body>
</html>
